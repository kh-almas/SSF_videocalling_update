<!doctype html>
<html lang="en" class="no-js">
    <head>
        <!-- Title and Icon -->

        <title id="title">MiroTalk SFU - Host Protected login required.</title>
        <link id="icon" rel="shortcut icon" href="../images/logo.svg" />
        <link id="appleTouchIcon" rel="apple-touch-icon" href="../images/logo.svg" />

        <!-- Meta Information -->

        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <meta
            id="description"
            name="description"
            content="MiroTalk SFU powered by WebRTC and mediasoup, Real-time Simple Secure Fast video calls, messaging and screen sharing capabilities in the browser."
        />

        <!-- https://ogp.me -->

        <meta property="og:type" content="{{OG_TYPE}}" />
        <meta property="og:site_name" content="{{OG_SITE_NAME}}" />
        <meta property="og:title" content="{{OG_TITLE}}" />
        <meta property="og:description" content="{{OG_DESCRIPTION}}" />
        <meta property="og:image" content="{{OG_IMAGE}}" />
        <meta property="og:url" content="{{OG_URL}}" />

        <!-- StyleSheet -->

        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:400,600" />
        <link rel="stylesheet" type="text/css" href="../css/landing.css" />
        <link rel="stylesheet" type="text/css" href="../css/login.css" />
        <link rel="stylesheet" type="text/css" href="../css/Translate.css" />

        <!-- Bootstrap 5 -->

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
            crossorigin="anonymous"
        />
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"
        ></script>

        <!-- https://animate.style 4 using for swal fadeIn-Out -->

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

        <!-- Font Awesome CDN for icons -->

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

        <!-- Js scripts -->

        <script async src="../js/Stats.js"></script>
        <script defer src="../js/Brand.js"></script>
        <script async src="../js/Translate.js"></script>

        <script src="https://unpkg.com/animejs@3.0.1/lib/anime.min.js"></script>
        <script src="https://unpkg.com/scrollreveal@4.0.0/dist/scrollreveal.min.js"></script>

        <!-- xss -->
        <script src="https://cdn.jsdelivr.net/npm/xss/dist/xss.min.js"></script>

        <!-- axios -->
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

        <!-- sweetalert -->
        <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.8"></script>
    </head>
    <body class="is-boxed has-animations">
        <div id="google_translate_element"></div>

        <div class="body-wrap">
            <header class="site-header reveal-from-top">
                <div class="container">
                    <div class="site-header-inner">
                        <div class="brand header-brand">
                            <h1 class="m-0">
                                <a href="/">
                                    <img
                                        id="headerLogo"
                                        src="../images/ssf_wing.png"
                                        alt="ssf_wing"
                                        width="150"
                                        height="64"
                                    />
                                </a>
                            </h1>
                        </div>
                    </div>
                </div>
            </header>

            <main class="site-content">
                <section class="hero section center-card-section">
                    <div class="container">
                        <div class="hero-inner">
                            <div class="login-card reveal-from-bottom" data-reveal-delay="150">
                                <div id="loginForm" class="login-form-section" role="form" aria-label="Login">
                                    <div class="login-icon">
                                        <i id="loginIconEl" class="fa-solid fa-lock"></i>
                                    </div>
                                    <h2 id="loginHeading" class="login-title">Welcome back</h2>
                                    <p id="loginDescription" class="login-description">
                                        Enter your credentials to continue.
                                    </p>
                                    <div class="login-input-group">
                                        <i class="fa-solid fa-user"></i>
                                        <input
                                            id="username"
                                            class="form-input"
                                            type="text"
                                            placeholder="Username"
                                            maxlength="254"
                                            autocomplete="username"
                                            required
                                        />
                                    </div>
                                    <div class="login-input-group">
                                        <i class="fa-solid fa-key"></i>
                                        <input
                                            id="password"
                                            class="form-input"
                                            type="password"
                                            placeholder="Password"
                                            maxlength="36"
                                            autocomplete="current-password"
                                            required
                                        />
                                        <button
                                            type="button"
                                            id="togglePassword"
                                            class="password-toggle"
                                            title="Show password"
                                            aria-label="Show password"
                                            aria-pressed="false"
                                            aria-controls="password"
                                        >
                                            <i class="fa-solid fa-eye" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                    <div
                                        id="loginError"
                                        class="login-error"
                                        role="alert"
                                        aria-live="polite"
                                        aria-atomic="true"
                                    >
                                        <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
                                        <span id="loginErrorText"></span>
                                    </div>
                                    <button id="loginButton" class="login-btn pulse" type="button">
                                        <span id="loginBtnText"
                                            ><i class="fa-solid fa-right-to-bracket"></i>&nbsp; Login</span
                                        >
                                        <span id="loginBtnLoader" class="login-btn-loader">
                                            <i class="fa-solid fa-circle-notch fa-spin"></i>&nbsp; Signing in...
                                        </span>
                                    </button>
                                </div>
                                <!-- Join Room Section hidden -->
                                <div id="joinRoomForm" class="login-form-section">
                                    <div class="login-icon login-icon-success">
                                        <i class="fa-solid fa-video"></i>
                                    </div>
                                    <h2 class="join-room-title">
                                        Pick name.<br />
                                        Share URL.<br />
                                        Start conference.
                                    </h2>
                                    <div class="room-input-row">
                                        <div class="login-input-group">
                                            <i class="fa-solid fa-door-open"></i>
                                            <select id="selectRoom" class="form-input"></select>
                                        </div>
                                        <button
                                            id="generateRoomButton"
                                            class="random-room-btn"
                                            title="Generate random room name"
                                        >
                                            <i class="fa-solid fa-arrows-rotate"></i>
                                        </button>
                                        <button id="shareRoomButton" class="random-room-btn" title="Share room link">
                                            <i class="fa-solid fa-share-nodes"></i>
                                        </button>
                                    </div>
                                    <button id="joinSelectRoomButton" class="join-room-btn">
                                        <i class="fa-solid fa-right-to-bracket"></i>&nbsp; JOIN ROOM
                                    </button>
                                    <div id="scheduleMeetingDivider" class="login-divider" hidden>
                                        <span>or</span>
                                    </div>
                                    <button
                                        id="scheduleMeetingBtn"
                                        class="join-room-btn schedule-meeting-login-btn"
                                        type="button"
                                        hidden
                                    >
                                        <i class="fas fa-calendar-check"></i>&nbsp; SCHEDULE MEETING
                                    </button>
                                </div>
                            </div>
                            <div class="hero-figure anime-element">
                                <svg class="placeholder" width="528" height="396" viewBox="0 0 528 396">
                                    <rect width="528" height="396" style="fill: transparent" />
                                </svg>
                                <div class="hero-figure-box hero-figure-box-01" data-rotation="45deg"></div>
                                <div class="hero-figure-box hero-figure-box-02" data-rotation="-45deg"></div>
                                <div class="hero-figure-box hero-figure-box-03" data-rotation="0deg"></div>
                                <div class="hero-figure-box hero-figure-box-04" data-rotation="-135deg"></div>
                                <div class="hero-figure-box hero-figure-box-05"></div>
                                <div class="hero-figure-box hero-figure-box-06"></div>
                                <div class="hero-figure-box hero-figure-box-07"></div>
                                <div class="hero-figure-box hero-figure-box-08" data-rotation="-22deg"></div>
                                <div class="hero-figure-box hero-figure-box-09" data-rotation="-52deg"></div>
                                <div class="hero-figure-box hero-figure-box-10" data-rotation="-50deg"></div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <script defer src="../js/Utils.js"></script>
        <script defer src="../js/Login.js"></script>
        <script defer src="../js/Landing.js"></script>
        <script defer src="../js/ScheduleMeeting.js"></script>
        <script async defer src="https://buttons.github.io/buttons.js"></script>
    </body>
</html>
